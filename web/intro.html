<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>RAG System Introduction</title>
<link rel="icon" type="image/png" href="/favicon.png">
<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
<style>
  @view-transition { navigation: auto; }
  :root {
    color-scheme: dark;
    font-size: clamp(14px, calc(12px + 0.32vw), 18px);
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --orange: #fb923c;
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg: #fcfbf7;
    --surface: #ffffff;
    --surface2: #f1efe9;
    --border: #e0ddd3;
    --text: #1f1c17;
    --text2: #6b6356;
    --accent: #4a63d8;
    --green: #3da55b;
    --yellow: #c89a13;
    --orange: #d97706;
  }
  /* Theme toggle button */
  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    margin-left: 14px;
    padding: 4px 6px;
    color: var(--text2);
    display: inline-flex;
    align-items: center;
    border-radius: 6px;
    transition: color .2s, background .2s;
  }
  .theme-toggle:hover { color: var(--accent); background: rgba(108,140,255,.08); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }
  html { scrollbar-gutter: stable; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ── Header ── */
  .header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    flex-shrink: 0;
    background: var(--surface);
    z-index: 10;
  }
  .header h1 { font-size: 1.0625rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .beta-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(108,140,255,.15);
    color: var(--accent);
    border: 1px solid rgba(108,140,255,.3);
    letter-spacing: .5px;
  }
  .header nav a {
    color: var(--text2);
    text-decoration: none;
    margin-left: 20px;
    font-size: 0.8125rem;
    transition: color .2s;
  }
  .header nav a:hover, .header nav a.active { color: var(--accent); }

  /* ── Content ── */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ── Markdown Styles ── */
  .md h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--accent);
    color: var(--text);
  }
  .md h2 {
    font-size: 1.25rem;
    font-weight: 600;
    margin-top: 40px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .md h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-top: 28px;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .md h4 {
    font-size: 0.84375rem;
    font-weight: 600;
    margin-top: 18px;
    margin-bottom: 6px;
    color: var(--text);
  }
  .md p {
    margin-bottom: 12px;
    color: var(--text);
    font-size: 0.90625rem;
  }
  .md ul, .md ol {
    margin-bottom: 12px;
    padding-left: 24px;
  }
  .md li {
    margin-bottom: 4px;
    font-size: 0.90625rem;
  }
  .md strong { color: var(--text); font-weight: 600; }
  .md em { color: var(--text2); font-style: italic; }
  .md code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.8125rem;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: var(--orange);
  }
  .md pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 16px;
    overflow-x: auto;
    line-height: 1.5;
  }
  .md pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 0.8125rem;
  }
  .md table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 0.875rem;
  }
  .md th {
    background: var(--surface);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 0.8125rem;
  }
  .md td {
    padding: 8px 14px;
    border: 1px solid var(--border);
    font-size: 0.84375rem;
  }
  .md tr:nth-child(even) td { background: var(--surface2); }
  .md tr:hover td { background: var(--surface2); }
  .md blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin-bottom: 12px;
    background: var(--surface);
    border-radius: 0 8px 8px 0;
    color: var(--text2);
  }
  .md hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 32px 0;
  }
  .md a { color: var(--accent); text-decoration: none; }
  .md a:hover { text-decoration: underline; }

  /* ── KaTeX math blocks ── */
  .md .math-block {
    margin: 18px 0 22px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-x: auto;
  }
  .md .math-block .katex-display { margin: 0; }
  .md .math-inline .katex { font-size: 1em; }
  .md .katex { color: var(--text); }
  .md .math-block::-webkit-scrollbar { height: 6px; }
  .md .math-block::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Hero (first viewport) ── */
  .md .hero {
    min-height: calc(100vh - 110px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    padding-bottom: 140px;
  }
  /* visual order = source order: H1 → dots → paragraphs */
  .md .hero h1 {
    font-size: 2.375rem;
    font-weight: 700;
    text-align: center;
    border-bottom: none;
    padding-bottom: 0;
    margin: 0 0 28px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -.5px;
    animation: hero-text .8s ease-out;
  }
  .md .hero h2 {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 6px;
    text-align: center;
    color: var(--accent);
    border-bottom: none;
    margin: 0 0 12px;
    padding: 0;
    text-transform: uppercase;
    animation: hero-text .8s ease-out;
  }
  .md .hero p {
    text-align: center;
    font-size: 0.9375rem;
    line-height: 1.85;
    max-width: 580px;
    margin: 0 auto 14px;
    text-wrap: balance;
    animation: hero-text .8s ease-out .15s both;
  }
  .md .hero h1 {
    text-wrap: balance;
  }
  [data-theme="light"] .md .hero h1 {
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }
  .md .hero p strong {
    color: var(--text);
    background: linear-gradient(transparent 65%, rgba(108, 140, 255, 0.45) 65%);
    padding: 0 2px;
    font-weight: 600;
  }
  /* hero-cue: dots + blockquote + SCROLL share one flex container so they truly align */
  .md .hero-cue {
    position: absolute;
    bottom: 26px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    pointer-events: none;
  }
  .md .hero-cue blockquote {
    margin: 0;
    background: none;
    border: none;
    border-radius: 0;
    padding: 0;
    font-size: 0.78125rem;
    line-height: 1.6;
    color: var(--text2);
    letter-spacing: .2px;
    text-align: center;
    max-width: 540px;
    text-wrap: balance;
    opacity: 0;
    animation: bq-fade-in .8s ease-out .8s forwards;
  }
  @keyframes bq-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: .75; transform: translateY(0); }
  }
  .md .hero-cue .scroll-cue {
    position: static;
    bottom: auto;
    left: auto;
    transform: none;
    pointer-events: auto;
    margin: 0;
  }
  @keyframes hero-text {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pipeline dots — sit between H1 title and body paragraphs */
  .md .hero-flow {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 4px 0 26px;
    animation: hero-text .8s ease-out .35s both;
  }
  .md .hero-flow .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 14px rgba(108,140,255,.5);
    animation: dot-flow 1.6s ease-in-out infinite;
  }
  .md .hero-flow > .dot:nth-child(3) { animation-delay: .25s; }
  .md .hero-flow > .dot:nth-child(5) { animation-delay: .5s; }
  .md .hero-flow .line {
    width: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(108,140,255,.5), transparent);
  }
  @keyframes dot-flow {
    0%, 100% { opacity: .35; transform: scale(.8); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }
  .md .hero-tags {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 20px 0 0;
    animation: hero-text .8s ease-out .7s both;
  }
  .md .hero-tags span {
    font-size: 0.6875rem;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(108,140,255,.08);
    border: 1px solid rgba(108,140,255,.25);
    color: var(--text2);
  }

  /* Hero next cue — slide right or click to go to /chat */
  .md .hero-next {
    position: fixed;
    right: 26px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 18px 10px;
    text-decoration: none !important;
    color: var(--text2);
    pointer-events: none;
    opacity: 0;
    transition: opacity .35s ease, color .2s, transform .25s, right .2s;
    z-index: 5;
  }
  .md .hero-next.in-hero {
    opacity: 1;
    pointer-events: auto;
  }
  .md .hero-next:hover {
    color: var(--accent);
    transform: translateY(-50%) translateX(-4px);
  }
  .md .hero-next .label {
    font-size: 0.6875rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .md .hero-next .next-arrow {
    width: 12px;
    height: 12px;
    border-top: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    animation: next-bounce 1.6s ease-in-out infinite;
  }
  @keyframes next-bounce {
    0%, 100% { transform: rotate(45deg) translate(-3px, 3px); opacity: .35; }
    50%      { transform: rotate(45deg) translate(3px, -3px); opacity: 1; }
  }

  /* Scroll cue — bouncing arrow */
  .scroll-cue {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    animation: hero-text 1s ease-out 1s both;
  }
  .scroll-cue .label {
    font-size: 0.6875rem;
    font-weight: 500;
    color: var(--text2);
    opacity: .55;
    text-transform: uppercase;
  }
  .scroll-arrow {
    width: 12px;
    height: 12px;
    border-right: 2px solid var(--accent);
    border-bottom: 2px solid var(--accent);
    margin: 12px auto 0;
    animation: arrow-bounce 1.6s ease-in-out infinite;
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: rotate(45deg) translate(-3px, -3px); opacity: .35; }
    50%      { transform: rotate(45deg) translate(3px, 3px);   opacity: 1; }
  }

  /* ── Info block (always visible) ── */
  .md .info-block {
    margin: 14px 0 28px;
    padding: 26px 30px 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(108,140,255,.04) 0%, rgba(0,0,0,0) 60%);
    position: relative;
    overflow: hidden;
  }
  .md .info-block > h2:first-child {
    margin-top: 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .md .info-block > h3 {
    margin-top: 26px;
  }

  /* ── Navigation cards ── */
  .md .nav-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
    margin: 10px 0 4px;
  }
  .md .nav-card {
    display: block;
    padding: 18px 20px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    text-decoration: none !important;
    color: var(--text);
    transition: transform .25s ease, border-color .25s, background .25s, box-shadow .25s;
    position: relative;
    overflow: hidden;
  }
  .md .nav-card:hover {
    transform: translateY(-3px);
    border-color: rgba(108,140,255,.5);
    background: var(--surface2);
    box-shadow: 0 8px 24px -10px rgba(108,140,255,.4);
    text-decoration: none;
  }
  .md .nav-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transition: left .6s ease;
  }
  .md .nav-card:hover::before { left: 100%; }
  .md .nav-card .nav-icon {
    width: 28px;
    height: 28px;
    color: var(--accent);
    margin-bottom: 12px;
    transition: transform .35s ease;
  }
  .md .nav-card:hover .nav-icon { transform: scale(1.1) rotate(-4deg); }
  .md .nav-card .nav-icon svg { width: 100%; height: 100%; }
  .md .nav-card .nav-title {
    font-size: 0.90625rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .md .nav-card:hover .nav-title { color: var(--accent); }
  .md .nav-card .nav-desc {
    font-size: 0.75rem;
    color: var(--text2);
    line-height: 1.55;
  }
  .md .nav-card .arrow-cue {
    position: absolute;
    right: 14px;
    bottom: 12px;
    color: var(--accent);
    font-size: 0.875rem;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity .25s, transform .25s;
  }
  .md .nav-card:hover .arrow-cue {
    opacity: 1;
    transform: translateX(0);
  }

  /* ── Animated Pipeline SVG ── */
  .md .pipeline-svg {
    display: block;
    width: 100%;
    max-width: 700px;
    height: auto;
    margin: 14px auto 24px;
  }
  .md .pipeline-svg .bot-icon { color: var(--accent); filter: drop-shadow(0 0 4px rgba(108,140,255,.5)); }
  .md .pipeline-svg .bot-mini { color: var(--text2); opacity: .85; }
  .md .pipeline-svg .bidi-line {
    stroke: rgba(108,140,255,.65);
    stroke-width: 2;
    fill: none;
  }
  .md .pipeline-svg .db-cyl {
    fill: rgba(108,140,255,.05);
    stroke: rgba(108,140,255,.5);
    stroke-width: 1.2;
  }
  .md .pipeline-svg .db-cyl-top {
    fill: rgba(108,140,255,.18);
    stroke: rgba(108,140,255,.55);
    stroke-width: 1.2;
  }
  .md .pipeline-svg .ptravel-l {
    fill: var(--accent);
    filter: drop-shadow(0 0 6px var(--accent));
    animation: travel-l 1.5s ease-in-out infinite;
  }
  .md .pipeline-svg .ptravel-r {
    fill: var(--accent);
    filter: drop-shadow(0 0 6px var(--accent));
    animation: travel-r 1.5s ease-in-out infinite;
    animation-delay: .75s;
  }
  @keyframes travel-l {
    0%   { opacity: 0; transform: translateX(0); }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-33px); }
  }
  @keyframes travel-r {
    0%   { opacity: 0; transform: translateX(0); }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(33px); }
  }
  .md .pipeline-svg .db-pill {
    fill: rgba(108,140,255,.08);
    stroke: rgba(108,140,255,.3);
    stroke-width: 1;
  }
  .md .pipeline-svg .db-pt {
    fill: var(--text2);
    font-size: 0.6875rem;
    font-weight: 500;
    text-anchor: middle;
  }
  .md .pipeline-svg .db-title {
    fill: var(--accent);
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: .8px;
    text-anchor: middle;
    text-transform: uppercase;
  }
  .md .pipeline-svg .pbox {
    fill: var(--surface2);
    stroke: var(--border);
    stroke-width: 1;
    transition: stroke .25s, filter .25s;
  }
  .md .pipeline-svg .pbox:hover {
    stroke: var(--accent);
    filter: drop-shadow(0 0 10px rgba(108,140,255,.35));
  }
  .md .pipeline-svg .accent-pbox {
    stroke: var(--accent);
    stroke-width: 1.5;
  }
  .md .pipeline-svg .final-pbox {
    fill: rgba(108,140,255,.08);
    stroke: var(--accent);
  }
  .md .pipeline-svg .ptitle {
    fill: var(--text);
    font-size: 0.875rem;
    font-weight: 700;
    text-anchor: middle;
  }
  .md .pipeline-svg .accent-text { fill: var(--accent); }
  .md .pipeline-svg .pdesc {
    fill: var(--text2);
    font-size: 0.6875rem;
    text-anchor: middle;
  }
  .md .pipeline-svg .ppill {
    fill: rgba(108,140,255,.12);
    stroke: rgba(108,140,255,.35);
    stroke-width: 1;
    transition: fill .25s, stroke .25s;
  }
  .md .pipeline-svg .ppill:hover {
    fill: rgba(108,140,255,.25);
    stroke: var(--accent);
  }
  .md .pipeline-svg .ppt {
    fill: var(--accent);
    font-size: 0.625rem;
    font-weight: 600;
    text-anchor: middle;
  }
  .md .pipeline-svg .ppt-row {
    fill: var(--accent);
    font-size: 0.6875rem;
    font-weight: 600;
    text-anchor: start;
  }
  .md .pipeline-svg .parrow {
    stroke: rgba(108,140,255,.45);
    stroke-width: 2;
    fill: none;
    stroke-dasharray: 5 4;
    animation: pmarch .7s linear infinite;
  }
  @keyframes pmarch { to { stroke-dashoffset: -9; } }
  .md .pipeline-svg .phead {
    fill: rgba(108,140,255,.7);
  }
  .md .pipeline-svg .ptravel {
    fill: var(--accent);
    filter: drop-shadow(0 0 6px var(--accent));
    animation: ptravel 1.6s linear infinite;
  }
  @keyframes ptravel {
    0%   { opacity: 0; transform: translateY(0); }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(44px); }
  }

  /* ── Collapsible sections ── */
  .md .sections { padding-top: 20px; }
  .md .sections > details,
  .md .sections > .info-block {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .md .sections > details.in-view,
  .md .sections > .info-block.in-view {
    opacity: 1;
    transform: translateY(0);
  }

  .md details {
    margin: 14px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .md details[open] {
    border-color: rgba(108,140,255,.35);
    box-shadow: 0 4px 24px -8px rgba(108,140,255,.2);
  }
  .md details > summary {
    cursor: pointer;
    padding: 13px 42px 13px 40px;
    font-size: 0.90625rem;
    font-weight: 600;
    color: var(--text);
    list-style: none;
    user-select: none;
    position: relative;
    transition: background .15s, color .15s;
  }
  .md details > summary::-webkit-details-marker { display: none; }
  .md details > summary::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 50%;
    width: 0;
    height: 0;
    border-left: 5px solid var(--accent);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transform: translateY(-50%);
    transition: transform .25s;
  }
  .md details[open] > summary::before {
    transform: translateY(-50%) rotate(90deg);
  }
  .md details > summary::after {
    content: '';
    position: absolute;
    right: 18px;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    transform: translateY(-50%);
    animation: pulse-dot 2.4s ease-in-out infinite;
    transition: opacity .3s;
  }
  .md details[open] > summary::after {
    opacity: 0;
    animation: none;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: .35; transform: translateY(-50%) scale(.85); box-shadow: 0 0 0 rgba(108,140,255,0); }
    50%      { opacity: 1;   transform: translateY(-50%) scale(1.25); box-shadow: 0 0 10px rgba(108,140,255,.7); }
  }
  .md details > summary:hover {
    background: var(--surface2);
    color: var(--accent);
  }
  .md details > summary:hover::before {
    transform: translateY(-50%) translateX(2px);
  }
  .md details[open] > summary:hover::before {
    transform: translateY(-50%) rotate(90deg) translateX(2px);
  }
  .md details[open] > summary {
    border-bottom: 1px solid var(--border);
    background: rgba(108,140,255,.05);
  }
  .md details > .dbody {
    padding: 18px 22px 4px;
  }
  .md details > .dbody > *:first-child { margin-top: 0; }
  .md details > .dbody > h3:first-child { margin-top: 4px; }
  .md details > .dbody > pre:first-child { margin-top: 0; }
  .md details > .dbody > h3 { margin-top: 22px; }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--text2);
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Mobile (≤640px) — keep header from overflowing ── */
  @media (max-width: 640px) {
    .header { padding: 10px 14px; gap: 6px; flex-wrap: wrap; }
    .header h1 { font-size: 0.875rem; }
    .header nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .header nav a { margin-left: 0; padding: 2px 6px; font-size: 0.75rem; }
    .theme-toggle { margin-left: 4px; padding: 2px 4px; }
    .theme-toggle svg { width: 14px; height: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>System Introduction <span class="beta-badge">Beta</span></h1>
  <nav>
    <a href="/intro" class="active">Intro</a>
    <a href="/chat">Chat</a>

    <a href="/qa">QA pairs</a>
    <a href="/results">Results</a>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="切換主題">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>

<div class="content">

<script>
function renderMath(tex, displayMode) {
  if (typeof katex === 'undefined') return esc(tex);  // KaTeX not loaded yet
  try {
    return katex.renderToString(tex, { displayMode, throwOnError: false, output: 'html' });
  } catch (e) {
    return `<span style="color:#ef4444">${esc(tex)}</span>`;
  }
}

// Minimal markdown parser (no external deps)
function parseMd(md) {
  let html = md;

  // ── Stage 1: extract LaTeX before markdown processing ──
  // Block math $$...$$ (multi-line allowed)
  const mathBlocks = [];
  html = html.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
    const i = mathBlocks.push(tex.trim()) - 1;
    return `\n<!--MATHBLK${i}-->\n`;
  });
  // Inline math $...$ (single line, no $)
  const mathInlines = [];
  html = html.replace(/\$([^\n$]+)\$/g, (_, tex) => {
    const i = mathInlines.push(tex.trim()) - 1;
    return `<!--MATHINL${i}-->`;
  });

  // Code blocks (```...```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${esc(code.trimEnd())}</code></pre>`;
  });

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${inline(c.trim())}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Headers (longer prefixes first so they don't get partially matched)
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^((?:- .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => `<li>${inline(l.replace(/^- /, ''))}</li>`).join('');
    return `<ul>${items}</ul>`;
  });

  // Ordered lists
  html = html.replace(/^((?:\d+\. .+\n?)+)/gm, (match) => {
    const items = match.trim().split('\n').map(l => `<li>${inline(l.replace(/^\d+\. /, ''))}</li>`).join('');
    return `<ol>${items}</ol>`;
  });

  // Paragraphs (lines not already wrapped — skip any line already starting with an HTML tag)
  html = html.replace(/^(?!<|$)(.+)$/gm, '<p>$1</p>');

  // Wrap details inner content (between </summary> and </details>) in a styled body
  html = html.replace(/(<\/summary>)([\s\S]*?)(<\/details>)/g, '$1<div class="dbody">$2</div>$3');

  // Inline formatting
  html = html.replace(/<(p|li|td|th|blockquote)>(.*?)<\/\1>/gs, (_, tag, content) => {
    return `<${tag}>${inline(content)}</${tag}>`;
  });

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');

  // ── Stage 2: restore LaTeX placeholders with KaTeX-rendered HTML ──
  html = html.replace(/<!--MATHBLK(\d+)-->/g, (_, i) =>
    `<div class="math-block">${renderMath(mathBlocks[+i], true)}</div>`);
  html = html.replace(/<!--MATHINL(\d+)-->/g, (_, i) =>
    `<span class="math-inline">${renderMath(mathInlines[+i], false)}</span>`);

  // Inject animated Pipeline SVG at placeholder
  html = html.replace('<div class="pipeline-placeholder"></div>', PIPELINE_SVG);

  // Split into hero + sections at the END-HERO marker
  const HERO_MARKER = '<!--END-HERO-->';
  const heroEnd = html.indexOf(HERO_MARKER);
  if (heroEnd > 0) {
    let heroContent = html.slice(0, heroEnd);
    const sectionsContent = html.slice(heroEnd + HERO_MARKER.length);

    // Lift blockquote out of hero body; quote and SCROLL align in .hero-cue
    let blockquoteHtml = '';
    heroContent = heroContent.replace(/<blockquote[\s\S]*?<\/blockquote>/, (m) => {
      blockquoteHtml = m;
      return '';
    });

    // Insert dots between H1 and the first paragraph
    const dotsHtml =
      '<div class="hero-flow">' +
        '<span class="dot"></span><span class="line"></span>' +
        '<span class="dot"></span><span class="line"></span>' +
        '<span class="dot"></span>' +
      '</div>';
    heroContent = heroContent.replace(/<\/h1>/, '</h1>' + dotsHtml);

    html =
      '<section class="hero">' + heroContent +
        '<div class="hero-cue">' +
          blockquoteHtml +
          '<div class="scroll-cue">' +
            '<div class="label">SCROLL</div>' +
            '<div class="scroll-arrow"></div>' +
          '</div>' +
        '</div>' +
        '<a class="hero-next" href="/chat" aria-label="Go to Chat">' +
          '<span class="label">Chat</span>' +
          '<span class="next-arrow"></span>' +
        '</a>' +
      '</section>' +
      '<section class="sections">' + sectionsContent + '</section>';
  }

  return html;
}

const PIPELINE_SVG = `

  <!-- 1. Query -->

  <text class="ptitle" x="350" y="58">Query</text>

  <rect class="pbox" x="150" y="140" width="400" height="100" rx="10"/>
  <text class="ptitle" x="350" y="166">Pre-Retrieval</text>

  <text class="ppt" x="232.5" y="220">Metadata 抽取</text>

  <line class="parrow" x1="350" y1="242" x2="350" y2="285"/>

  <!-- Database (cylinder shape, vertical) -->
  <path class="db-cyl" d="M 23 279 A 42 8 0 0 0 107 279 L 107 381 A 42 8 0 0 1 23 381 Z"/>

  <!-- DB ↔ Retrieval — two arrows, opposite directions, each with a flowing dot -->
  <!-- Top: Retrieval → DB (query out) -->

  <!-- 3. Retrieval (RRF) -->
  <rect class="pbox accent-pbox" x="150" y="290" width="400" height="80" rx="10" fill="url(#ag)"/>
  <text class="ptitle accent-text" x="350" y="318">Retrieval — Hybrid + RRF Fusion</text>
  <text class="pdesc" x="350" y="340">6 signals (Dense×3 · BM25×2 · Metadata×2) → RRF → Top-10</text>

  <!-- arrow 3 -->
  <line class="parrow" x1="350" y1="372" x2="350" y2="415"/>
  <polygon class="phead" points="345,411 350,420 355,411"/>

  <!-- 4. Post-Retrieval (= LLM Re-ranking step) -->
  <rect class="pbox" x="150" y="420" width="400" height="70" rx="10"/>

  <text class="ptitle" x="350" y="448">Post-Retrieval</text>
  <text class="pdesc" x="350" y="470">LLM Re-ranking · Top-10 → Top-3</text>

  <!-- arrow → Generation -->

  <!-- 5. Generation (= Type-Specific Answer Generation) -->
  <rect class="pbox" x="150" y="540" width="400" height="80" rx="10"/>

  <!-- arrow → Answer -->

  <!-- 6. Answer -->
  <rect class="pbox final-pbox" x="230" y="670" width="240" height="60" rx="10"/>

function inline(s) {
  // Inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
  return s;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setupRevealOnScroll() {
  const targets = document.querySelectorAll('.md .sections > details, .md .sections > .info-block');
  if (!('IntersectionObserver' in window)) {
    targets.forEach(el => el.classList.add('in-view'));
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in-view');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  targets.forEach(el => observer.observe(el));
}

// Hero swipe-right gesture → /chat (only when hero is in view)
function setupHeroSwipe() {
  const hero = document.querySelector('.md .hero');
  if (!hero) return;
  const heroNext = document.querySelector('.md .hero-next');

  let heroVisible = true;
  const setHeroVisible = (v) => {
    heroVisible = v;
    if (heroNext) heroNext.classList.toggle('in-hero', v);
  };
  setHeroVisible(true);
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(([entry]) => {
      setHeroVisible(entry.intersectionRatio > 0.5);
    }, { threshold: [0, 0.5, 1] });
    obs.observe(hero);
  }

  // Trackpad horizontal scroll
  let wheelLockUntil = 0;
  let wheelAccum = 0;
  window.addEventListener('wheel', e => {
    if (!heroVisible) return;
    if (Date.now() < wheelLockUntil) return;
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 1.2 && e.deltaX > 8) {
      wheelAccum += e.deltaX;
      if (wheelAccum > 80) {
        wheelLockUntil = Date.now() + 1500;
        wheelAccum = 0;
        location.href = '/chat';
      }
    } else {
      wheelAccum = 0;
    }
  }, { passive: true });

  // Touch swipe right
  let touchStartX = 0, touchStartY = 0;
  hero.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  hero.addEventListener('touchend', e => {
    if (!heroVisible) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5 && dx > 0) {
      location.href = '/chat';
    }
  }, { passive: true });
}

function whenKatexReady() {
  return new Promise(resolve => {
    if (typeof katex !== 'undefined') return resolve();
    const t0 = Date.now();
    const id = setInterval(() => {
      if (typeof katex !== 'undefined' || Date.now() - t0 > 4000) {
        clearInterval(id);
        resolve();
      }
    }, 50);
  });
}

async function load() {
  try {
    const [resp] = await Promise.all([fetch('/api/intro'), whenKatexReady()]);
    const data = await resp.json();
    document.getElementById('md').innerHTML = parseMd(data.content);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('md').style.display = 'block';
    setupRevealOnScroll();
    setupHeroSwipe();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:var(--red)">Error loading: ${e.message}</div>`;
  }
}

load();
</script>
</body>
