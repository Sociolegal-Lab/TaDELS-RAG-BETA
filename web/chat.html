<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaDELS RAG Chat</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c8cff;
    --green: #4ade80;
    --user-bg: #1e3a5f;
    --bot-bg: #1a1d27;
  }
  html { scrollbar-gutter: stable; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }
  .header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .beta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(108,140,255,.15);
    color: var(--accent);
    border: 1px solid rgba(108,140,255,.3);
    letter-spacing: .5px;
  }
  .header nav { display: flex; align-items: center; gap: 20px; }
  .header nav a {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    transition: color .2s;
  }
  .header nav a:hover, .header nav a.active { color: var(--accent); }

  /* ── Options (inline in header) ── */
  .options {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: var(--text2);
    align-items: center;
    margin-right: 16px;
  }
  .options label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: color .2s;
    position: relative;
  }
  .options label:hover { color: var(--text); }
  .options label .tip {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-line;
    width: 320px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    pointer-events: none;
  }
  .options label:hover .tip { display: block; }
  .options input[type="checkbox"] {
    accent-color: var(--accent);
    width: 13px;
    height: 13px;
  }

  /* ── Main Content (chat + side panel) ── */
  .main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  /* ── Side Panel (Reference Viewer) ── */
  .side-panel {
    width: 0;
    overflow: hidden;
    border-left: 1px solid var(--border);
    background: var(--surface);
    transition: width .3s ease;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .side-panel.open {
    width: 480px;
  }
  .side-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .side-panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    margin-right: 8px;
  }
  .side-panel-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background .2s, color .2s;
    flex-shrink: 0;
  }
  .side-panel-close:hover { background: var(--surface2); color: var(--text); }
  .side-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .side-panel-body::-webkit-scrollbar { width: 6px; }
  .side-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .side-panel-section {
    margin-bottom: 16px;
  }
  .side-panel-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }
  .side-panel-meta {
    font-size: 12px;
    color: var(--text2);
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .side-panel-fulltext {
    font-size: 13px;
    color: var(--text);
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.7;
    max-height: none;
  }
  .side-panel-id {
    font-size: 11px;
    color: var(--text2);
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .side-panel-nav {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .side-panel-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 6px;
    transition: background .2s, color .2s;
  }
  .side-panel-nav button:hover { background: var(--border); color: var(--text); }
  @media (max-width: 900px) {
    .side-panel.open { width: 100%; position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; }
  }

  .msg {
    animation: fadeIn .3s;
    word-break: break-word;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg-user {
    align-self: flex-end;
    max-width: 75%;
  }
  .msg-user .msg-bubble {
    background: var(--user-bg);
    padding: 12px 16px;
    border-radius: 14px;
    border-bottom-right-radius: 4px;
    font-size: 14px;
    line-height: 1.7;
    color: #dbeafe;
  }

  .msg-bot {
    align-self: stretch;
    width: 100%;
  }
  .msg-bot .msg-bubble {
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.8;
    border-bottom: 1px solid var(--border);
  }

  .answer-text { margin-bottom: 8px; }

  /* ── Debug ── */
  .debug-toggle {
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    margin-top: 8px;
    user-select: none;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background .2s;
  }
  .debug-toggle:hover { background: var(--surface2); color: var(--accent); }
  .debug-content {
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .debug-content.open { display: block; }

  /* ── Refs ── */
  .refs-container {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .refs-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .ref-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .ref-card:hover { border-color: var(--accent); background: rgba(108,140,255,.05); }
  .ref-card-header {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ref-card-title { font-size: 13px; font-weight: 500; color: #c8ccd6; }
  .ref-card-id { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .ref-chevron {
    color: var(--text2);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* ── Step progress ── */
  .steps-log {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.8;
  }
  .step-line {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
  }
  .step-line.active { color: var(--accent); }
  .step-line .step-icon {
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .step-line.active .step-icon { animation: spin .8s linear infinite; }
  .step-line.done .step-icon { color: var(--green); }
  .step-label { overflow: hidden; white-space: nowrap; }
  .step-cursor {
    display: inline-block;
    width: 1px;
    height: 1em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink .5s step-end infinite;
  }
  .step-line.done .step-cursor { display: none; }
  @keyframes blink { 50% { opacity: 0; } }
  .step-time {
    margin-left: auto;
    font-size: 10px;
    color: var(--text2);
    font-family: 'SF Mono', 'Consolas', monospace;
    opacity: .7;
  }

  /* ── Typing ── */
  .typing {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-5px); opacity: .3; } }

  /* ── Input Bar ── */
  .input-bar {
    padding: 12px 24px 8px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--text2);
    padding: 4px 24px 12px;
    opacity: .7;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 8px 8px 18px;
    transition: border-color .2s;
    margin: 0 auto;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 2;
    padding: 4px 0;
  }
  .input-wrap textarea::placeholder { color: var(--text2); }
  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 36px;
    cursor: pointer;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* ── Welcome ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    text-align: center;
    gap: 12px;
  }
  .welcome h2 { font-size: 22px; color: var(--text); font-weight: 600; }
  .welcome p { font-size: 14px; max-width: 440px; line-height: 1.7; }
  .examples {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
    max-width: 640px;
    width: 100%;
  }
  .example-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: border-color .2s, background .2s;
    line-height: 1.5;
  }
  .example-btn:hover { border-color: var(--accent); background: var(--surface2); }

  @media (max-width: 640px) {
    .examples { grid-template-columns: 1fr; }
    .options { display: none; }
    .filter-panel { max-height: 50vh !important; }
  }

  /* ── Data Source Filter ── */
  .filter-bar {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .filter-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 24px;
    cursor: pointer;
    user-select: none;
    transition: background .2s;
  }
  .filter-toggle:hover { background: var(--surface2); }
  .filter-toggle-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .filter-toggle-left .ft-icon {
    font-size: 11px;
    transition: transform .25s;
    color: var(--text2);
  }
  .filter-bar.open .filter-toggle-left .ft-icon { transform: rotate(90deg); }
  .filter-stats {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .filter-stats .fs-enabled {
    color: var(--green);
    font-weight: 600;
  }
  .filter-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .filter-bar.open .filter-panel {
    max-height: 60vh;
    overflow-y: auto;
  }
  .filter-panel::-webkit-scrollbar { width: 6px; }
  .filter-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ftree { padding: 8px 16px 12px; }
  .ftree ul { list-style: none; padding: 0; margin: 0; }
  .ftree li { position: relative; }
  .ftree .fnode {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .ftree .fnode .farrow {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 10px;
    transition: transform .2s;
    flex-shrink: 0;
    border-radius: 4px;
  }
  .ftree .fnode .farrow:hover { background: var(--surface2); }
  .ftree .fnode .farrow.expanded { transform: rotate(90deg); }
  .ftree .fnode .farrow.leaf { visibility: hidden; }
  .ftree .fnode input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .ftree .fnode input[type="checkbox"]:disabled {
    cursor: not-allowed;
    opacity: .35;
  }
  .ftree .fnode .fname {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .ftree .fnode.disabled .fname {
    color: var(--text2);
    opacity: .5;
  }
  .ftree .fnode .fcount {
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
    margin-left: 4px;
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .ftree .fnode.disabled .fcount { opacity: .4; }
  .ftree .fchildren {
    display: none;
    padding-left: 22px;
  }
  .ftree .fchildren.open { display: block; }

  /* depth-based indent colors */
  .ftree > ul > li > .fnode .fname { font-weight: 600; font-size: 13px; }
  .ftree > ul > li > .fchildren > li > .fnode .fname { font-weight: 500; }
</style>
</head>
<body>

<div class="header">
  <h1>TaDELS RAG Chat <span class="beta-badge">Beta</span></h1>
  <nav>
    <div class="options">
      <label><input type="checkbox" id="opt-rewrite" checked> Rewrite
        <span class="tip">用 LLM 改寫問題，以更符合法律文件用語。
例：「猩猩比中指被罰多少？」→「被移送人於社群媒體散布猩猩比中指貼圖，違反社會秩序維護法第63條，裁處罰鍰金額為何？」</span>
      </label>
      <label><input type="checkbox" id="opt-hyde"> HyDE
        <span class="tip">Hypothetical Document Embeddings — LLM 先生成一段假設性回答，再用該段落的 embedding 做語意檢索，提升召回率。
Ref: Gao et al. (2023) Precise Zero-Shot Dense Retrieval without Relevance Labels, ACL 2023.</span>
      </label>
      <label><input type="checkbox" id="opt-rerank" checked> Re-rank
        <span class="tip">用 LLM 對初步檢索到的文件重新排序，挑出與問題最相關的前 3 篇送去生成答案。
例：初步撈回 10 篇 → LLM 判斷相關性 → 只保留最相關的 3 篇。</span>
      </label>
      <label><input type="checkbox" id="opt-entities"> Entities
        <span class="tip">從回答中抽取結構化欄位（被告、法條、罰鍰金額等），用於評估準確度。</span>
      </label>
    </div>
    <a href="/intro">Intro</a>
    <a href="/results">Results</a>
    <a href="/chat" class="active">Chat</a>
    <a href="/entities">Entities</a>
    <a href="/qa">QA</a>
  </nav>
</div>

<div class="filter-bar" id="filterBar">
  <div class="filter-toggle" onclick="document.getElementById('filterBar').classList.toggle('open')">
    <div class="filter-toggle-left">
      <span class="ft-icon">&#9654;</span>
      <span>資料來源篩選</span>
    </div>
    <div class="filter-stats">
      <span id="filterStats"></span>
    </div>
  </div>
  <div class="filter-panel">
    <div class="ftree" id="filterTree"></div>
  </div>
</div>

<div class="main-content">
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <h2>TaDELS RAG</h2>
    <p>挑戰一：針對 211 篇 COVID-19 相關法律判決文件進行問答<br>支援案號、被告姓名、法條等檢索</p>
    <div class="examples">
      <button class="example-btn" onclick="askExample(this)">109年度士秩字第59號裁定中，對被移送人蔡宗龍裁處的罰鍰金額為何？</button>
      <button class="example-btn" onclick="askExample(this)">109年度中秩字第99號裁定中，證人王慧貞的身份為何？</button>
      <button class="example-btn" onclick="askExample(this)">109年度店秩字第78號裁定中，法院裁定駁回本件移送的原因為何？請說明事實經過與法律依據。</button>
      <button class="example-btn" onclick="askExample(this)">109年度店秩字第45號裁定中，被移送人汪庭維不罰的理由為何？</button>
    </div>
  </div>
</div>
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header">
    <div class="side-panel-title" id="sidePanelTitle"></div>
    <div class="side-panel-nav" id="sidePanelNav"></div>
    <button class="side-panel-close" onclick="closeSidePanel()">&times;</button>
  </div>
  <div class="side-panel-body" id="sidePanelBody"></div>
</div>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea id="input" placeholder="輸入問題... (Enter 送出)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>
<div class="disclaimer">AI 生成內容僅供參考，可能存在錯誤或不完整之處，請務必自行查證。</div>

const DB_AVAILABLE = new Set([

function isInDB(path) {
  for (const p of DB_AVAILABLE) {
    if (path === p || path.startsWith(p + '/') || p.startsWith(path + '/')) return true;
  }
  return false;
}

function buildFilterTree() {
  const container = document.getElementById('filterTree');
  const ul = document.createElement('ul');
  CATEGORY_TREE.forEach(node => ul.appendChild(buildNode(node, '')));
  container.appendChild(ul);
  updateFilterStats();
}

function buildNode(data, parentPath) {
  const path = parentPath ? parentPath + '/' + data.name : data.name;
  const hasChildren = data.children && data.children.length > 0;
  const inDB = isInDB(path);

  const li = document.createElement('li');

  // Node row
  const row = document.createElement('div');
  row.className = 'fnode' + (inDB ? '' : ' disabled');

  // Arrow
  const arrow = document.createElement('span');
  arrow.className = 'farrow' + (hasChildren ? '' : ' leaf');
  arrow.textContent = '\u25B6';
  arrow.addEventListener('click', () => {
    if (!hasChildren) return;
    arrow.classList.toggle('expanded');
    childrenUl.classList.toggle('open');
  });
  row.appendChild(arrow);

  // Checkbox
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.dataset.path = path;
  cb.dataset.count = data.count;
  if (inDB) {
    cb.checked = true;
  } else {
    cb.disabled = true;
    cb.checked = false;
  }
  cb.addEventListener('change', () => {
    // Propagate to children
    if (hasChildren) {
      childrenUl.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(c => {
        c.checked = cb.checked;
      });
    }
    // Update parent indeterminate states
    updateParentState(li);
    updateFilterStats();
  });
  row.appendChild(cb);

  // Label
  const label = document.createElement('span');
  label.className = 'fname';
  label.textContent = data.name;
  label.title = path;
  row.appendChild(label);

  // Count
  const count = document.createElement('span');
  count.className = 'fcount';
  count.textContent = data.count.toLocaleString();
  row.appendChild(count);

  li.appendChild(row);

  // Children
  let childrenUl = null;
  if (hasChildren) {
    childrenUl = document.createElement('ul');
    childrenUl.className = 'fchildren';
    data.children.forEach(child => childrenUl.appendChild(buildNode(child, path)));
    li.appendChild(childrenUl);
  }

  return li;
}

function updateParentState(li) {
  const parentUl = li.parentElement;
  if (!parentUl || !parentUl.classList.contains('fchildren')) return;
  const parentLi = parentUl.parentElement;
  if (!parentLi) return;
  const parentCb = parentLi.querySelector(':scope > .fnode > input[type="checkbox"]');
  if (!parentCb || parentCb.disabled) return;

  const childCbs = parentUl.querySelectorAll(':scope > li > .fnode > input[type="checkbox"]:not(:disabled)');
  const checked = [...childCbs].filter(c => c.checked).length;
  const total = childCbs.length;

  if (total === 0) return;
  parentCb.checked = checked > 0;
  parentCb.indeterminate = checked > 0 && checked < total;
  updateParentState(parentLi);
}

function updateFilterStats() {
  const all = document.querySelectorAll('#filterTree input[type="checkbox"]');
  const enabled = [...all].filter(c => !c.disabled);
  const checked = enabled.filter(c => c.checked);
  // Count docs from leaf-level checked items only
  const leafChecked = checked.filter(c => {
    const li = c.closest('li');
    return !li.querySelector('ul.fchildren');
  });
  const docCount = leafChecked.reduce((s, c) => s + parseInt(c.dataset.count || 0), 0);

  const statsEl = document.getElementById('filterStats');
  const totalInDB = [...all].filter(c => !c.disabled).length;
  statsEl.innerHTML = `<span class="fs-enabled">${docCount.toLocaleString()} 篇已選</span> / ${totalInDB} 項可用`;
}

function getSelectedPaths() {
  const checked = document.querySelectorAll('#filterTree input[type="checkbox"]:checked:not(:disabled)');
  // Return leaf paths only
  return [...checked].filter(c => {
    const li = c.closest('li');
    return !li.querySelector('ul.fchildren');
  }).map(c => c.dataset.path);
}

function getSelectedTitles() {
  // Collect all leaf-level (document title) checkboxes
  const allLeaf = document.querySelectorAll('#filterTree input[type="checkbox"]:not(:disabled)');
  const checkedTitles = [];
  let totalLeaf = 0;
  allLeaf.forEach(cb => {
    const li = cb.closest('li');
    if (!li.querySelector(':scope > ul.fchildren')) {
      totalLeaf++;
      if (cb.checked) {
        const path = cb.dataset.path;
        const parts = path.split('/');
        checkedTitles.push(parts[parts.length - 1]);
      }
    }
  });
  console.log(`[Filter] ${checkedTitles.length}/${totalLeaf} docs selected`);
  // Always send the list — backend filters; null only if totalLeaf is 0 (no tree)
  if (totalLeaf === 0) return null;
  return checkedTitles;
}

        let i = 0;
        function tick() {
          if (i < text.length) {
            el.textContent += text[i++];
            chatArea.scrollTop = chatArea.scrollHeight;
            setTimeout(tick, speed);
          } else { resolve(); }
        }
        tick();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      for (const line of lines) {
        if (!line.trim()) continue;
        const msg = JSON.parse(line);
        if (msg.type === 'step') {
          const now = performance.now();
          // Mark previous step as done
          if (currentStepEl) {
            const elapsed = ((now - stepStart) / 1000).toFixed(1);
            currentStepEl.classList.remove('active');
            currentStepEl.classList.add('done');
            currentStepEl.querySelector('.step-icon').innerHTML = '&#10003;';
            currentStepEl.querySelector('.step-time').textContent = elapsed + 's';
          }
          stepStart = now;
          // Add new step line
          const div = document.createElement('div');
          div.className = 'step-line active';
          div.innerHTML = `<span class="step-icon">&#9679;</span><span class="step-label"><span class="step-cursor"></span></span><span class="step-time">...</span>`;
          stepsLog.appendChild(div);
          currentStepEl = div;
          // Typewriter the label
          const label = div.querySelector('.step-label');
          const cursor = label.querySelector('.step-cursor');
          const stepText = msg.step;
          typewriteQueue = typewriteQueue.then(() => {
            return new Promise(resolve => {
              let i = 0;
              function tick() {
                if (i < stepText.length) {
                  cursor.before(document.createTextNode(stepText[i++]));
                  chatArea.scrollTop = chatArea.scrollHeight;
                  setTimeout(tick, 20);
                } else { resolve(); }
              }
              tick();
            });
          });
          chatArea.scrollTop = chatArea.scrollHeight;
        } else if (msg.type === 'result') {
          // Wait for any pending typewriter to finish
          await typewriteQueue;
          // Mark last step done
          if (currentStepEl) {
            const elapsed = ((performance.now() - stepStart) / 1000).toFixed(1);
            currentStepEl.classList.remove('active');
            currentStepEl.classList.add('done');
            currentStepEl.querySelector('.step-icon').innerHTML = '&#10003;';
            currentStepEl.querySelector('.step-time').textContent = elapsed + 's';
          }
          // Add total time
          const total = ((performance.now() - t0) / 1000).toFixed(1);
          const totalDiv = document.createElement('div');
          totalDiv.className = 'step-line done';
          totalDiv.style.marginTop = '4px';
          totalDiv.style.fontWeight = '500';
          totalDiv.style.color = 'var(--green)';
          totalDiv.innerHTML = `<span class="step-icon">&#10003;</span><span class="step-label">Done</span><span class="step-time">${total}s total</span>`;
          stepsLog.appendChild(totalDiv);
          finalData = msg;
          finalData._stepsHtml = stepsLog.innerHTML;
        } else if (msg.type === 'error') {
          throw new Error(msg.detail);
        }
      }
    }

    typingEl.remove();
    if (finalData) addBotMsg(finalData);
  } catch (e) {
    typingEl.remove();
    addMsg('bot', `Error: ${e.message}`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addBotMsg(data) {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';

  // Store refs data globally for side panel access
  let refsHtml = '';
  if (data.refs && data.refs.length) {
    const refGroupId = 'rg-' + Date.now();
    window[refGroupId] = data.refs;
    refsHtml = `
      <div class="refs-container">
        <div class="refs-label">Referenced Documents (${data.refs.length})</div>
        ${data.refs.map((ref, i) => `
          <div class="ref-card" onclick="openRefPanel('${refGroupId}', ${i})">
            <div class="ref-card-header">
              <div>
                <div class="ref-card-title">[${i+1}] ${esc(ref.title)}</div>
                <div class="ref-card-id">${esc(ref.doc_id)}</div>
              </div>
              <span class="ref-chevron">&#9654;</span>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  let debugHtml = '';
  if (data.debug) {
    const d = data.debug;
    let debugText = '';
    if (d.query_type) debugText += `Type: ${d.query_type}\n`;
    if (d.rewritten) debugText += `Rewritten: ${d.rewritten}\n`;
    if (d.sub_queries && d.sub_queries.length) debugText += `Sub-queries: ${JSON.stringify(d.sub_queries)}\n`;
    if (d.hyde && document.getElementById('opt-hyde').checked) debugText += `HyDE: ${d.hyde}\n`;
    if (data.entities && Object.keys(data.entities).length && document.getElementById('opt-entities').checked) {
      debugText += `Entities: ${JSON.stringify(data.entities, null, 2)}`;
    }
    if (debugText) {
      debugHtml = `
        <span class="debug-toggle" onclick="this.nextElementSibling.classList.toggle('open')">debug info</span>
        <div class="debug-content">${esc(debugText)}</div>`;
    }
  }

  let stepsHtml = '';
  if (data._stepsHtml) {
    stepsHtml = `
      <span class="debug-toggle" onclick="const el=this.nextElementSibling;el.classList.toggle('open');this.textContent=el.classList.contains('open')?'collapse steps':'expand steps'">expand steps</span>
      <div class="steps-log debug-content">${data._stepsHtml}</div>`;
  }

  div.innerHTML = `
    <div class="msg-bubble">
      ${stepsHtml}
      <div class="answer-text">${formatAnswer(data.answer)}</div>
      ${refsHtml}
      ${debugHtml}
    </div>`;

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Side Panel ──
let currentRefGroup = null;
let currentRefIdx = 0;

function openRefPanel(groupId, idx) {
  currentRefGroup = groupId;
  currentRefIdx = idx;
  const refs = window[groupId];
  const ref = refs[idx];
  const panel = document.getElementById('sidePanel');
  const title = document.getElementById('sidePanelTitle');
  const nav = document.getElementById('sidePanelNav');
  const body = document.getElementById('sidePanelBody');

  title.textContent = `[${idx+1}/${refs.length}] ${ref.title}`;

  // Nav buttons
  nav.innerHTML = refs.length > 1 ? `
    <button onclick="openRefPanel('${groupId}', ${(idx - 1 + refs.length) % refs.length})">&larr;</button>
    <button onclick="openRefPanel('${groupId}', ${(idx + 1) % refs.length})">&rarr;</button>
  ` : '';

  // Body content
  body.innerHTML = `
    <div class="side-panel-section">
      <div class="side-panel-section-label">Metadata</div>
      <div class="side-panel-id">${esc(ref.doc_id)}</div>
      <div class="side-panel-meta" style="margin-top:8px">${esc(ref.metadata_text)}</div>
    </div>
    <div class="side-panel-section">
      <div class="side-panel-section-label">Full Text</div>
      <div class="side-panel-fulltext" id="sidePanelFullText">Loading...</div>
    </div>
  `;

  panel.classList.add('open');

  // Highlight active ref card
  document.querySelectorAll('.ref-card').forEach(c => c.style.borderColor = '');
  event && event.currentTarget && (event.currentTarget.style.borderColor = 'var(--accent)');

  // Load full text
  fetch(`/api/doc/${ref.doc_id}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('sidePanelFullText');
      if (el) el.textContent = d.full_text || '(No content)';
    })
    .catch(() => {
      const el = document.getElementById('sidePanelFullText');
      if (el) el.textContent = 'Error loading full text';
    });
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.querySelectorAll('.ref-card').forEach(c => c.style.borderColor = '');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatAnswer(s) {
  if (!s) return '';
  // Escape HTML, collapse 2+ newlines into one, convert single newlines to <br>
  return esc(s.trim())
    .replace(/\n{2,}/g, '\n')
    .replace(/\n/g, '<br>');
}
