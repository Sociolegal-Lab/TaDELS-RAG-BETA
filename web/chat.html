<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>TaDELS RAG Chat</title>
<link rel="icon" type="image/png" href="/favicon.png">
<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>
<style>
  @view-transition { navigation: auto; }
  :root {
    color-scheme: dark;
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c8cff;
    --green: #4ade80;
    --user-bg: #1e3a5f;
    --bot-bg: #1a1d27;
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg: #fcfbf7;
    --surface: #ffffff;
    --surface2: #f1efe9;
    --border: #e0ddd3;
    --text: #1f1c17;
    --text2: #6b6356;
    --accent: #4a63d8;
    --green: #3da55b;
    --user-bg: #e3ebfa;
    --bot-bg: #ffffff;
  }
  /* Welcome H2 gradient: in light mode #fff blends into white bg */
  [data-theme="light"] .welcome h2 {
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
  }
  /* Theme toggle button */
  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    margin-left: 14px;
    padding: 4px 6px;
    color: var(--text2);
    display: inline-flex;
    align-items: center;
    border-radius: 6px;
    transition: color .2s, background .2s;
  }
  .theme-toggle:hover { color: var(--accent); background: rgba(108,140,255,.08); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }
  html { scrollbar-gutter: stable; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }
  .header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .beta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(108,140,255,.15);
    color: var(--accent);
    border: 1px solid rgba(108,140,255,.3);
    letter-spacing: .5px;
  }
  .header nav { display: flex; align-items: center; gap: 20px; }
  .header nav a {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    transition: color .2s;
  }
  .header nav a:hover, .header nav a.active { color: var(--accent); }
  .help-btn {
    width: 20px;
    height: 20px;
    box-sizing: border-box;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font: 600 12px/1 inherit;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, border-color .15s, background .15s;
  }
  .help-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(108,140,255,.1);
  }


  /* ── Main Content (chat + side panel) ── */
  .main-content {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  /* ── Side Panel (Reference Viewer) ── */
  .side-panel {
    width: 0;
    overflow: hidden;
    border-left: 1px solid var(--border);
    background: var(--surface);
    transition: width .3s ease;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .side-panel.open {
    width: 480px;
  }
  .side-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .side-panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    margin-right: 8px;
  }
  .side-panel-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background .2s, color .2s;
    flex-shrink: 0;
  }
  .side-panel-close:hover { background: var(--surface2); color: var(--text); }
  .side-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .side-panel-body::-webkit-scrollbar { width: 6px; }
  .side-panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .side-panel-section {
    margin-bottom: 16px;
  }
  .side-panel-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }
  .side-panel-meta {
    font-size: 12px;
    color: var(--text2);
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.6;
  }
  .side-panel-fulltext {
    font-size: 13px;
    color: var(--text);
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    white-space: pre-wrap;
    line-height: 1.7;
    max-height: none;
  }
  .side-panel-id {
    font-size: 11px;
    color: var(--text2);
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .side-panel-nav {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .side-panel-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 6px;
    transition: background .2s, color .2s;
  }
  .side-panel-nav button:hover { background: var(--border); color: var(--text); }
  @media (max-width: 900px) {
    .side-panel.open { width: 100%; position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; }
  }

  .msg {
    animation: fadeIn .3s;
    word-break: break-word;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg-user {
    align-self: flex-end;
    max-width: 75%;
  }
  .msg-user .msg-bubble {
    background: var(--user-bg);
    padding: 12px 16px;
    border-radius: 14px;
    border-bottom-right-radius: 4px;
    font-size: 14px;
    line-height: 1.7;
    color: #dbeafe;
  }

  .msg-bot {
    align-self: stretch;
    width: 100%;
  }
  .msg-bot .msg-bubble {
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.8;
    border-bottom: 1px solid var(--border);
  }

  .answer-text { margin-bottom: 8px; }

  /* ── Debug ── */
  .debug-toggle {
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    margin-top: 8px;
    user-select: none;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background .2s;
  }
  .debug-toggle:hover { background: var(--surface2); color: var(--accent); }
  .debug-content {
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .debug-content.open { display: block; }

  /* ── Refs ── */
  .refs-container {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .refs-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .ref-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .ref-card:hover { border-color: var(--accent); background: rgba(108,140,255,.05); }
  .ref-card-header {
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ref-card-title { font-size: 13px; font-weight: 500; color: #c8ccd6; }
  .ref-card-id { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .ref-chevron {
    color: var(--text2);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* ── Step progress ── */
  .steps-log {
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.8;
  }
  .step-line {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
  }
  .step-line.active { color: var(--accent); }
  .step-line .step-icon {
    width: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .step-line.active .step-icon { animation: spin .8s linear infinite; }
  .step-line.done .step-icon { color: var(--green); }
  .step-label { overflow: hidden; white-space: nowrap; }
  .step-cursor {
    display: inline-block;
    width: 1px;
    height: 1em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink .5s step-end infinite;
  }
  .step-line.done .step-cursor { display: none; }
  @keyframes blink { 50% { opacity: 0; } }
  .step-time {
    margin-left: auto;
    font-size: 10px;
    color: var(--text2);
    font-family: 'SF Mono', 'Consolas', monospace;
    opacity: .7;
  }

  /* ── Typing ── */
  .typing {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-5px); opacity: .3; } }

  /* ── Input Bar ── */
  .input-bar {
    padding: 12px 24px 8px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--text2);
    padding: 4px 24px 12px;
    opacity: .7;
  }
  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 8px 8px 18px;
    transition: border-color .2s;
    margin: 0 auto;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-wrap textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 2;
    padding: 4px 0;
  }
  .input-wrap textarea::placeholder { color: var(--text2); }
  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    width: 40px;
    height: 36px;
    cursor: pointer;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* ── Welcome ── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    text-align: center;
    gap: 16px;
  }
  .welcome h2 {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    text-wrap: balance;
    max-width: 640px;
    animation: welcome-fade .8s ease-out;
  }
  .welcome p {
    font-size: 15px;
    line-height: 1.85;
    max-width: 520px;
    text-wrap: balance;
    animation: welcome-fade .8s ease-out .15s both;
  }
  @keyframes welcome-fade {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }
  @media (max-width: 640px) {
    .welcome h2 { font-size: 28px; }
  }
  .examples {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 24px;
    max-width: 923px;
    width: 100%;
  }
  .example-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: border-color .2s, background .2s;
    line-height: 1.6;
  }
  .example-btn:hover { border-color: var(--accent); background: var(--surface2); }

  @media (max-width: 640px) {
    .examples { grid-template-columns: 1fr; }
    .filter-panel { max-height: 50vh !important; }
  }

  /* ── Data Source Filter ── */
  .filter-bar {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .filter-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 24px;
    cursor: pointer;
    user-select: none;
    transition: background .2s;
  }
  .filter-toggle:hover { background: var(--surface2); }
  .filter-toggle-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .filter-toggle-left .ft-icon {
    font-size: 11px;
    transition: transform .25s;
    color: var(--text2);
  }
  .filter-bar.open .filter-toggle-left .ft-icon { transform: rotate(90deg); }

  /* ── Options popover (next to send button) ── */
  .opt-wrap { position: relative; flex-shrink: 0; }
  .opt-btn {
    position: relative;
    width: 36px;
    height: 36px;
    background: transparent;
    border: none;
    border-radius: 9px;
    color: var(--text2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color .2s, background .2s;
    padding: 0;
  }
  .opt-btn svg { width: 18px; height: 18px; }
  .opt-btn:hover, .opt-btn.active {
    color: var(--accent);
    background: rgba(108,140,255,.1);
  }
  .opt-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    padding: 0 4px;
    border-radius: 9px;
    border: 2px solid var(--bg);
    box-sizing: border-box;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    pointer-events: none;
  }
  .opt-popover {
    position: absolute;
    bottom: calc(100% + 10px);
    right: -8px;
    width: 360px;
    max-width: calc(100vw - 32px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 12px 36px rgba(0,0,0,.55);
    padding: 10px;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transform: translateY(6px);
    transition: opacity .2s, transform .2s, visibility 0s linear .2s;
  }
  .opt-popover.show {
    opacity: 1;
    visibility: visible;
    transform: none;
    transition: opacity .2s, transform .2s, visibility 0s;
  }
  .opt-popover::after {
    content: '';
    position: absolute;
    bottom: -7px;
    right: 18px;
    width: 12px;
    height: 12px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transform: rotate(45deg);
  }
  .opt-popover-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 6px 10px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .opt-item {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .15s;
  }
  .opt-item:hover { background: var(--surface2); }
  .opt-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    margin-top: 2px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .opt-item-text { flex: 1; min-width: 0; }
  .opt-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .opt-item-desc {
    font-size: 11.5px;
    color: var(--text2);
    line-height: 1.65;
  }
  .opt-ref {
    color: var(--text2);
    opacity: .7;
    font-style: italic;
  }
  @media (max-width: 640px) {
    .opt-popover { width: calc(100vw - 32px); right: -8px; }
  }
  .filter-stats {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .filter-stats .fs-enabled {
    color: var(--green);
    font-weight: 600;
  }
  .filter-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .filter-bar.open .filter-panel {
    max-height: 60vh;
    overflow-y: auto;
  }
  .filter-panel::-webkit-scrollbar { width: 6px; }
  .filter-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .ftree { padding: 8px 16px 12px; }
  .ftree ul { list-style: none; padding: 0; margin: 0; }
  .ftree li { position: relative; }
  .ftree .fnode {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  .ftree .fnode .farrow {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text2);
    font-size: 10px;
    transition: transform .2s;
    flex-shrink: 0;
    border-radius: 4px;
  }
  .ftree .fnode .farrow:hover { background: var(--surface2); }
  .ftree .fnode .farrow.expanded { transform: rotate(90deg); }
  .ftree .fnode .farrow.leaf { visibility: hidden; }
  .ftree .fnode input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .ftree .fnode input[type="checkbox"]:disabled {
    cursor: not-allowed;
    opacity: .35;
  }
  .ftree .fnode .fname {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }
  .ftree .fnode.disabled .fname {
    color: var(--text2);
    opacity: .5;
  }
  .ftree .fnode .fcount {
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
    margin-left: 4px;
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .ftree .fnode.disabled .fcount { opacity: .4; }
  .ftree .fchildren {
    display: none;
    padding-left: 22px;
  }
  .ftree .fchildren.open { display: block; }

  /* depth-based indent colors */
  .ftree > ul > li > .fnode .fname { font-weight: 600; font-size: 13px; }
  .ftree > ul > li > .fchildren > li > .fnode .fname { font-weight: 500; }

  /* ── Onboarding Modal ── */
  .ob-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    opacity: 0;

// Paths that are actually in the database (have indexed embeddings)
const DB_AVAILABLE = new Set([
  '人權案件檔案/政治人權/COVID-19 疫情言論'
]);

function isInDB(path) {
  for (const p of DB_AVAILABLE) {
    if (path === p || path.startsWith(p + '/') || p.startsWith(path + '/')) return true;
  }
  return false;
}

function buildFilterTree() {
  const container = document.getElementById('filterTree');
  const ul = document.createElement('ul');
  CATEGORY_TREE.forEach(node => ul.appendChild(buildNode(node, '')));
  container.appendChild(ul);
  updateFilterStats();
}

function buildNode(data, parentPath) {
  const path = parentPath ? parentPath + '/' + data.name : data.name;
  const hasChildren = data.children && data.children.length > 0;
  const inDB = isInDB(path);

  const li = document.createElement('li');

  // Node row
  const row = document.createElement('div');
  row.className = 'fnode' + (inDB ? '' : ' disabled');
  if (!inDB) {
    row.title = '此案件收錄持續開發測試中，敬請期待';
  }

  // Arrow
  const arrow = document.createElement('span');
  arrow.className = 'farrow' + (hasChildren ? '' : ' leaf');
  arrow.textContent = '\u25B6';
  arrow.addEventListener('click', () => {
    if (!hasChildren) return;
    arrow.classList.toggle('expanded');
    childrenUl.classList.toggle('open');
  });
  row.appendChild(arrow);

  // Checkbox
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.dataset.path = path;
  cb.dataset.count = data.count;
  if (inDB) {
    cb.checked = true;
  } else {
    cb.disabled = true;
    cb.checked = false;
  }
  cb.addEventListener('change', () => {
    // Propagate to children
    if (hasChildren) {
      childrenUl.querySelectorAll('input[type="checkbox"]:not(:disabled)').forEach(c => {
        c.checked = cb.checked;
      });
    }
    // Update parent indeterminate states
    updateParentState(li);
    updateFilterStats();
  });
  row.appendChild(cb);

  // Label
  const label = document.createElement('span');
  label.className = 'fname';
  label.textContent = data.name;
  label.title = path;
  row.appendChild(label);

  // Count
  const count = document.createElement('span');
  count.className = 'fcount';
  count.textContent = data.count.toLocaleString();
  row.appendChild(count);

  li.appendChild(row);

  // Children
  let childrenUl = null;
  if (hasChildren) {
    childrenUl = document.createElement('ul');
    childrenUl.className = 'fchildren';
    data.children.forEach(child => childrenUl.appendChild(buildNode(child, path)));
    li.appendChild(childrenUl);
  }

  return li;
}

function updateParentState(li) {
  const parentUl = li.parentElement;
  if (!parentUl || !parentUl.classList.contains('fchildren')) return;
  const parentLi = parentUl.parentElement;
  if (!parentLi) return;
  const parentCb = parentLi.querySelector(':scope > .fnode > input[type="checkbox"]');
  if (!parentCb || parentCb.disabled) return;

  const childCbs = parentUl.querySelectorAll(':scope > li > .fnode > input[type="checkbox"]:not(:disabled)');
  const checked = [...childCbs].filter(c => c.checked).length;
  const total = childCbs.length;

  if (total === 0) return;
  parentCb.checked = checked > 0;
  parentCb.indeterminate = checked > 0 && checked < total;
  updateParentState(parentLi);
}

// 「案件」= 樹狀結構第三層節點（如 COVID-19 疫情言論、美麗島事件、RCA工殤案…）
const TOTAL_CASES = (() => {
  let n = 0;
  CATEGORY_TREE.forEach(l1 => (l1.children || []).forEach(l2 => { n += (l2.children || []).length; }));
  return n;
})();

function updateFilterStats() {
  let selectedCases = 0;
  let selectedDocs = 0;

  document.querySelectorAll('#filterTree input[type="checkbox"]').forEach(cb => {
    if (!DB_AVAILABLE.has(cb.dataset.path)) return;
    // 此 cb 是有索引的案件分類，計算底下勾選的判決文件
    const folderLi = cb.closest('li');
    const leafCbs = [...folderLi.querySelectorAll('input[type="checkbox"]:not(:disabled)')]
      .filter(c => !c.closest('li').querySelector('ul.fchildren'));
    const checkedLeafCbs = leafCbs.filter(c => c.checked);
    selectedDocs += checkedLeafCbs.length;
    if (checkedLeafCbs.length > 0) selectedCases++;
  });

  const statsEl = document.getElementById('filterStats');
  statsEl.innerHTML = `已勾選 <span class="fs-enabled">${selectedCases}</span> 件（共 <span class="fs-enabled">${selectedDocs.toLocaleString()}</span> 筆資料）／ 總共 ${TOTAL_CASES.toLocaleString()} 案件`;
}

function getSelectedPaths() {
  const checked = document.querySelectorAll('#filterTree input[type="checkbox"]:checked:not(:disabled)');
  // Return leaf paths only
  return [...checked].filter(c => {
    const li = c.closest('li');
    return !li.querySelector('ul.fchildren');
  }).map(c => c.dataset.path);
}

function getSelectedTitles() {
  // Collect all leaf-level (document title) checkboxes
  const allLeaf = document.querySelectorAll('#filterTree input[type="checkbox"]:not(:disabled)');
  const checkedTitles = [];
  let totalLeaf = 0;
  allLeaf.forEach(cb => {
    const li = cb.closest('li');
    if (!li.querySelector(':scope > ul.fchildren')) {
      totalLeaf++;
      if (cb.checked) {
        const path = cb.dataset.path;
        const parts = path.split('/');
        checkedTitles.push(parts[parts.length - 1]);
      }
    }
  });
  console.log(`[Filter] ${checkedTitles.length}/${totalLeaf} docs selected`);
  // Always send the list — backend filters; null only if totalLeaf is 0 (no tree)
  if (totalLeaf === 0) return null;
  return checkedTitles;
}

async function send() {

  input.value = '';

      method: 'POST',

      body: JSON.stringify({
        question: text,

    // Typewriter helper
    function typewrite(el, text, speed = 25) {
      return new Promise(resolve => {
        let i = 0;
        function tick() {
          if (i < text.length) {
            el.textContent += text[i++];
            chatArea.scrollTop = chatArea.scrollHeight;
            setTimeout(tick, speed);
          } else { resolve(); }
        }
        tick();
      });
    }

    // Read NDJSON stream with step progress
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalData = null;
    const t0 = performance.now();
    let stepStart = t0;

    // Add steps log container
    const bubble = typingEl.querySelector('.msg-bubble');
    const stepsLog = document.createElement('div');
    stepsLog.className = 'steps-log';
    bubble.appendChild(stepsLog);
    let currentStepEl = null;
    let typewriteQueue = Promise.resolve();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        const msg = JSON.parse(line);
        if (msg.type === 'step') {
          const now = performance.now();
          // Mark previous step as done
          if (currentStepEl) {
            const elapsed = ((now - stepStart) / 1000).toFixed(1);
            currentStepEl.classList.remove('active');
            currentStepEl.classList.add('done');
            currentStepEl.querySelector('.step-icon').innerHTML = '&#10003;';
            currentStepEl.querySelector('.step-time').textContent = elapsed + 's';
          }
          stepStart = now;
          // Add new step line
          const div = document.createElement('div');
          div.className = 'step-line active';
          div.innerHTML = `<span class="step-icon">&#9679;</span><span class="step-label"><span class="step-cursor"></span></span><span class="step-time">...</span>`;
          stepsLog.appendChild(div);
          currentStepEl = div;
          // Typewriter the label
          const label = div.querySelector('.step-label');
          const cursor = label.querySelector('.step-cursor');
          const stepText = msg.step;
          typewriteQueue = typewriteQueue.then(() => {
            return new Promise(resolve => {
              let i = 0;
              function tick() {
                if (i < stepText.length) {
                  cursor.before(document.createTextNode(stepText[i++]));
                  chatArea.scrollTop = chatArea.scrollHeight;
                  setTimeout(tick, 20);
                } else { resolve(); }
              }
              tick();
            });
          });
          chatArea.scrollTop = chatArea.scrollHeight;
        } else if (msg.type === 'result') {
          // Wait for any pending typewriter to finish
          await typewriteQueue;
          // Mark last step done
          if (currentStepEl) {
            const elapsed = ((performance.now() - stepStart) / 1000).toFixed(1);
            currentStepEl.classList.remove('active');
            currentStepEl.classList.add('done');
            currentStepEl.querySelector('.step-icon').innerHTML = '&#10003;';
            currentStepEl.querySelector('.step-time').textContent = elapsed + 's';
          }
          // Add total time
          const total = ((performance.now() - t0) / 1000).toFixed(1);
          const totalDiv = document.createElement('div');
          totalDiv.className = 'step-line done';
          totalDiv.style.marginTop = '4px';
          totalDiv.style.fontWeight = '500';
          totalDiv.style.color = 'var(--green)';
          totalDiv.innerHTML = `<span class="step-icon">&#10003;</span><span class="step-label">Done</span><span class="step-time">${total}s total</span>`;
          stepsLog.appendChild(totalDiv);
          finalData = msg;
          finalData._stepsHtml = stepsLog.innerHTML;
        } else if (msg.type === 'error') {
          throw new Error(msg.detail);
        }
      }
    }

    typingEl.remove();
    if (finalData) addBotMsg(finalData);
  } catch (e) {
    typingEl.remove();
    addMsg('bot', `Error: ${e.message}`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="msg-bubble">${esc(text)}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';
  div.innerHTML = `<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addBotMsg(data) {
  const div = document.createElement('div');
  div.className = 'msg msg-bot';

  // Store refs data globally for side panel access
  let refsHtml = '';
  if (data.refs && data.refs.length) {
    const refGroupId = 'rg-' + Date.now();
    window[refGroupId] = data.refs;
    refsHtml = `
      <div class="refs-container">
        <div class="refs-label">Referenced Documents (${data.refs.length})</div>
        ${data.refs.map((ref, i) => `
          <div class="ref-card" onclick="openRefPanel('${refGroupId}', ${i})">
            <div class="ref-card-header">
              <div>
                <div class="ref-card-title">[${i+1}] ${esc(ref.title)}</div>
                <div class="ref-card-id">${esc(ref.doc_id)}</div>
              </div>
              <span class="ref-chevron">&#9654;</span>
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  let debugHtml = '';
  if (data.debug) {
    const d = data.debug;
    let debugText = '';
    if (d.query_type) debugText += `Type: ${d.query_type}\n`;
    if (d.rewritten) debugText += `Rewritten: ${d.rewritten}\n`;
    if (d.sub_queries && d.sub_queries.length) debugText += `Sub-queries: ${JSON.stringify(d.sub_queries)}\n`;
    if (d.hyde && document.getElementById('opt-hyde').checked) debugText += `HyDE: ${d.hyde}\n`;
    if (data.entities && Object.keys(data.entities).length && document.getElementById('opt-entities').checked) {
      debugText += `Entities: ${JSON.stringify(data.entities, null, 2)}`;
    }
    if (debugText) {
      debugHtml = `
        <span class="debug-toggle" onclick="this.nextElementSibling.classList.toggle('open')">debug info</span>
        <div class="debug-content">${esc(debugText)}</div>`;
    }
  }

  let stepsHtml = '';
  if (data._stepsHtml) {
    stepsHtml = `
      <span class="debug-toggle" onclick="const el=this.nextElementSibling;el.classList.toggle('open');this.textContent=el.classList.contains('open')?'collapse steps':'expand steps'">expand steps</span>
      <div class="steps-log debug-content">${data._stepsHtml}</div>`;
  }

  div.innerHTML = `
    <div class="msg-bubble">
      ${stepsHtml}
      <div class="answer-text">${formatAnswer(data.answer)}</div>
      ${refsHtml}
      ${debugHtml}
    </div>`;

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// ── Side Panel ──
let currentRefGroup = null;
let currentRefIdx = 0;

function openRefPanel(groupId, idx) {
  currentRefGroup = groupId;
  currentRefIdx = idx;
  const refs = window[groupId];
  const ref = refs[idx];
  const panel = document.getElementById('sidePanel');
  const title = document.getElementById('sidePanelTitle');
  const nav = document.getElementById('sidePanelNav');
  const body = document.getElementById('sidePanelBody');

  title.textContent = `[${idx+1}/${refs.length}] ${ref.title}`;

  // Nav buttons
  nav.innerHTML = refs.length > 1 ? `
    <button onclick="openRefPanel('${groupId}', ${(idx - 1 + refs.length) % refs.length})">&larr;</button>
    <button onclick="openRefPanel('${groupId}', ${(idx + 1) % refs.length})">&rarr;</button>
  ` : '';

  // Body content
  body.innerHTML = `
    <div class="side-panel-section">
      <div class="side-panel-section-label">Metadata</div>
      <div class="side-panel-id">${esc(ref.doc_id)}</div>
      <div class="side-panel-meta" style="margin-top:8px">${esc(ref.metadata_text)}</div>
    </div>
    <div class="side-panel-section">
      <div class="side-panel-section-label">Full Text</div>
      <div class="side-panel-fulltext" id="sidePanelFullText">Loading...</div>
    </div>
  `;

  panel.classList.add('open');

  // Highlight active ref card
  document.querySelectorAll('.ref-card').forEach(c => c.style.borderColor = '');
  event && event.currentTarget && (event.currentTarget.style.borderColor = 'var(--accent)');

  // Load full text
  fetch(`/api/doc/${ref.doc_id}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('sidePanelFullText');
      if (el) el.textContent = d.full_text || '(No content)';
    })
    .catch(() => {
      const el = document.getElementById('sidePanelFullText');
      if (el) el.textContent = 'Error loading full text';
    });
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.querySelectorAll('.ref-card').forEach(c => c.style.borderColor = '');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatAnswer(s) {
  if (!s) return '';
  // Escape HTML, collapse 2+ newlines into one, convert single newlines to <br>
  return esc(s.trim())
    .replace(/\n{2,}/g, '\n')
    .replace(/\n/g, '<br>');
}

/* ── Onboarding & Tour ── */
const TOUR_STEPS = [
  {
    selector: '#filterBar',
    title: '步驟 1：選擇文件範圍',
    desc: '在這裡可以展開資料夾樹，勾選你想查詢的判決文件。預設會包含全部 211 篇 COVID-19 案件。',
    arrow: 'top',
    action: () => { document.getElementById('filterBar').classList.add('open'); }
  },
  {
    selector: '.opt-popover',
    title: '步驟 2：勾選 RAG 組件',
    desc: '輸入框旁邊的齒輪按鈕可以開關 Rewrite（改寫問題）、HyDE（假設文件）、Re-rank（重新排序）、Entities（抽取實體）。每項旁邊都有詳細說明。',
    arrow: 'bottom',
    action: () => {
      document.getElementById('filterBar').classList.remove('open');
      document.getElementById('optPopover').classList.add('show');
      document.getElementById('optBtn').classList.add('active');
    }
  },
  {
    selector: '.examples',
    title: '步驟 3：點擊預設提問',
    desc: '不知道怎麼開始？直接點擊任一個範例問題，系統會立刻送出並展示完整的檢索流程。',
    arrow: 'bottom',
    action: () => closeOptPopover()
  },
  {
    selector: '.input-wrap',
    title: '步驟 4：自由提問',
    desc: '針對目前收錄的判決文件，輸入任何想問的問題（例：罰鍰金額、不罰理由、法條依據…），按 Enter 送出。',
    arrow: 'bottom',
    action: () => closeOptPopover()
  },
  {
    selector: '.header nav',
    title: '步驟 5：其他頁面',
    desc: '頂部導覽列可切換到不同頁面：<br>'
        + '<b>?</b> — 隨時重新打開這份教學<br>'
        + '<b>Intro</b> — 系統架構與 pipeline 詳解<br>'
        + '<b>Results</b> — 各組件評估分數比較<br>'
        + '<b>Chat</b> — 互動問答（你現在這裡）<br>'
        + '<b>Entities</b> — 結構化欄位抽取檢查<br>'
        + '<b>QA</b> — 標準題目集瀏覽',
    arrow: 'top',
    action: () => closeOptPopover()
  }
];

let tourIdx = 0;
const TOUR_KEY = 'tadels_tour_seen_v1';

function showWelcomeModal() {
  const el = document.getElementById('obBackdrop');
  if (el) el.classList.add('show');
  else console.error('[showWelcomeModal] obBackdrop not found');
}
function hideWelcomeModal() {
  const el = document.getElementById('obBackdrop');
  if (el) el.classList.remove('show');
}
window.showWelcomeModal = showWelcomeModal;
window.hideWelcomeModal = hideWelcomeModal;
function skipTour() {
  hideWelcomeModal();
  localStorage.setItem(TOUR_KEY, '1');
}
function startTour() {
  hideWelcomeModal();
  localStorage.setItem(TOUR_KEY, '1');
  tourIdx = 0;
  document.getElementById('tourOverlay').classList.add('show');
  renderTourStep();
}
function startTourAnimated(btn) {
  // Fly the arrow → fade modal → start tour
  btn.classList.add('flying');
  btn.disabled = true;
  setTimeout(() => {
    startTour();
    // Reset for next time the modal is opened via "?" button
    setTimeout(() => {
      btn.classList.remove('flying');
      btn.disabled = false;
    }, 400);
  }, 280);
}
function endTour() {
  document.getElementById('tourOverlay').classList.remove('show');
  document.getElementById('filterBar').classList.remove('open');
  closeOptPopover();
}
function nextTourStep() {
  if (tourIdx >= TOUR_STEPS.length - 1) { endTour(); return; }
  tourIdx++;
  renderTourStep();
}
function nextTourStepAnimated(btn) {
  if (btn.disabled) return;
  btn.classList.add('flying');
  btn.disabled = true;
  setTimeout(() => {
    nextTourStep();
    // renderTourStep() resets state for non-final step; for the final step,
    // the overlay is fading out so resetting isn't visible — but do it anyway:
    btn.classList.remove('flying');
    btn.disabled = false;
  }, 280);
}
function prevTourStep() {
  if (tourIdx === 0) return;
  tourIdx--;
  renderTourStep();
}
function renderTourStep() {
  const step = TOUR_STEPS[tourIdx];
  if (step.action) step.action();

  const target = document.querySelector(step.selector);
  if (!target) { nextTourStep(); return; }

  // Wait a tick so any layout changes (e.g. opening filter panel) settle
  requestAnimationFrame(() => {
    const rect = target.getBoundingClientRect();
    const pad = 6;
    const spot = document.getElementById('tourSpot');
    spot.style.top    = (rect.top - pad) + 'px';
    spot.style.left   = (rect.left - pad) + 'px';
    spot.style.width  = (rect.width + pad * 2) + 'px';
    spot.style.height = (rect.height + pad * 2) + 'px';

    const tip = document.getElementById('tourTooltip');
    tip.dataset.arrow = step.arrow;
    document.getElementById('ttStep').textContent  = `STEP ${tourIdx + 1} / ${TOUR_STEPS.length}`;
    document.getElementById('ttTitle').textContent = step.title;
    document.getElementById('ttDesc').innerHTML    = step.desc;

    // Position tooltip
    const tipW = 340, tipH = tip.offsetHeight || 180;
    let top, left;
    if (step.arrow === 'top') {
      top  = rect.bottom + 14;
      left = Math.max(12, Math.min(window.innerWidth - tipW - 12, rect.left));
    } else if (step.arrow === 'bottom') {
      top  = rect.top - tipH - 14;
      left = Math.max(12, Math.min(window.innerWidth - tipW - 12, rect.left));
    } else if (step.arrow === 'left') {
      top  = Math.max(12, rect.top);
      left = rect.right + 14;
    } else {
      top  = Math.max(12, rect.top);
      left = rect.left - tipW - 14;
    }
    tip.style.top  = top  + 'px';
    tip.style.left = left + 'px';

    // Dots
    const dots = document.getElementById('ttDots');
    dots.innerHTML = '';
    TOUR_STEPS.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'tt-dot' + (i === tourIdx ? ' active' : '');
      dots.appendChild(d);
    });

    // Buttons
    const prev = document.getElementById('ttPrev');
    const next = document.getElementById('ttNext');
    prev.style.visibility = tourIdx === 0 ? 'hidden' : 'visible';
    const isLast = tourIdx === TOUR_STEPS.length - 1;
    next.innerHTML = isLast
      ? '完成<span class="tt-arrow">&#10003;</span>'
      : '下一步<span class="tt-arrow">&rarr;</span>';
    next.classList.remove('flying');
    next.disabled = false;

    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

window.addEventListener('resize', () => {
  if (document.getElementById('tourOverlay').classList.contains('show')) renderTourStep();
});
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('tourOverlay').classList.contains('show')) return;
  if (e.key === 'Escape')      endTour();
  else if (e.key === 'ArrowRight') nextTourStep();
  else if (e.key === 'ArrowLeft')  prevTourStep();
});

// Show welcome modal on first visit
if (!localStorage.getItem(TOUR_KEY)) {
  setTimeout(showWelcomeModal, 350);
}

// Expose a way to re-trigger from the console / other places
window.restartTour = () => { localStorage.removeItem(TOUR_KEY); showWelcomeModal(); };
</script>
