<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Entity Checker</title>
<link rel="icon" type="image/png" href="/favicon.png">
<script>
(function(){
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
</script>
<style>
  @view-transition { navigation: auto; }
  :root {
    color-scheme: dark;
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e1e4ed;
    --text2: #8b90a0;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --orange: #fb923c;
    --highlight: rgba(250,204,21,.25);
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg: #fcfbf7;
    --surface: #ffffff;
    --surface2: #f1efe9;
    --border: #e0ddd3;
    --text: #1f1c17;
    --text2: #6b6356;
    --accent: #4a63d8;
    --green: #3da55b;
    --yellow: #c89a13;
    --red: #c74a4a;
    --orange: #d97706;
    --highlight: rgba(200,154,19,.32);
  }
  /* Theme toggle button */
  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    margin-left: 14px;
    padding: 4px 6px;
    color: var(--text2);
    display: inline-flex;
    align-items: center;
    border-radius: 6px;
    transition: color .2s, background .2s;
  }
  .theme-toggle:hover { color: var(--accent); background: rgba(108,140,255,.08); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: block; }
  [data-theme="light"] .theme-toggle .icon-moon { display: none; }
  html { scrollbar-gutter: stable; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }
  .header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .beta-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(108,140,255,.15);
    color: var(--accent);
    border: 1px solid rgba(108,140,255,.3);
    letter-spacing: .5px;
  }
  .header nav a {
    color: var(--text2);
    text-decoration: none;
    margin-left: 20px;
    font-size: 13px;
  }
  .header nav a:hover, .header nav a.active { color: var(--accent); }

  /* ── Toolbar ── */
  .toolbar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }
  .stat { font-size: 12px; color: var(--text2); flex-shrink: 0; }
  .filter-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  /* ── 3-column layout ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Left: case list */
  .list-panel {
    width: 320px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .list-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
  }
  .list-item:hover { background: var(--surface2); }
  .list-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .list-title { font-size: 12px; font-weight: 500; line-height: 1.4; }
  .list-meta { font-size: 10px; color: var(--text2); margin-top: 3px; display: flex; gap: 6px; }
  .list-tag { padding: 0px 5px; border-radius: 3px; font-size: 10px; }
  .tag-green { background: rgba(74,222,128,.15); color: var(--green); }
  .tag-red { background: rgba(248,113,113,.15); color: var(--red); }
  .tag-yellow { background: rgba(250,204,21,.15); color: var(--yellow); }

  /* Middle: entity fields */
  .entity-panel {
    flex: 1;
    min-width: 300px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 16px;
  }

  /* Right: full text */
  .fulltext-panel {
    flex: 1;
    min-width: 300px;
    overflow-y: auto;
    padding: 16px;
  }

  .panel-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    font-size: 13px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Entity table */
  .module { margin-bottom: 16px; }
  .module-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--orange);
    margin-bottom: 6px;
  }
  .field-table { width: 100%; border-collapse: collapse; }
  .field-table tr { border-bottom: 1px solid var(--border); }
  .field-table tr:hover { background: var(--surface2); }
  .field-table tr.highlight-row { background: rgba(108,140,255,.1); }
  .field-key {
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    width: 140px;
    vertical-align: top;
    white-space: nowrap;
  }
  .field-val {
    padding: 6px 10px;
    font-size: 12px;
    line-height: 1.5;
    word-break: break-all;
    cursor: pointer;
    transition: background .15s;
  }
  .field-val:hover { background: rgba(108,140,255,.08); }
  .field-null { color: var(--text2); font-style: italic; }

  /* Full text */
  .fulltext-content {
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .fulltext-content mark {
    background: var(--highlight);
    color: var(--text);
    padding: 1px 2px;
    border-radius: 2px;
  }

  .loading { text-align: center; padding: 40px; color: var(--text2); }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Entity Checker <span class="beta-badge">Beta</span></h1>
  <nav>
    <a href="/intro">Intro</a>
    <a href="/chat">Chat</a>
    <a href="/entities" class="active">Entities</a>
    <a href="/qa">QA pairs</a>
    <a href="/results">Results</a>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="切換主題">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </nav>
</div>

<div class="toolbar">
  <input class="search-box" id="search" placeholder="Search doc_id, title, defendant, content...">
  <select class="filter-select" id="filterVerdict" onchange="applyFilters()">
    <option value="">All verdicts</option>
    <option value="不罰">不罰</option>
    <option value="有罪">有罪</option>
    <option value="罰鍰">罰鍰</option>
    <option value="起訴">起訴</option>
    <option value="駁回">駁回</option>
    <option value="無罪">無罪</option>
  </select>
  <select class="filter-select" id="filterPlatform" onchange="applyFilters()">
    <option value="">All platforms</option>
    <option value="Facebook">Facebook</option>
    <option value="LINE">LINE</option>
    <option value="Instagram">Instagram</option>
    <option value="PTT">PTT</option>
    <option value="Dcard">Dcard</option>
  </select>
  <span class="stat" id="stat"></span>
</div>

<div class="main">
  <div class="list-panel" id="listPanel">
    <div class="loading"><div class="spinner"></div>Loading cases...</div>
  </div>
  <div class="entity-panel" id="entityPanel">
    <div class="panel-empty">Select a case</div>
  </div>
  <div class="fulltext-panel" id="fulltextPanel">
    <div class="panel-empty">Full text will appear here</div>
  </div>
</div>

<script>
let allEntities = [];
let filtered = [];
let selectedDocId = null;
let currentHighlight = '';

const MODULE_LABEL = {
  basic_info: '案件基本資訊',
  elements: '構成要件',
  procedure: '程序資訊',
  cited_authority: '引用法源',
};

const FIELD_LABEL = {
  DOC_TYPE: '文書種類', COURT: '法院', TRANSFER_AGENCY: '移送機關',
  PROSECUTION: '起訴情形', CASE_NO: '案號', RELATED_CASE_NO: '相關案號',
  DEFENDANT: '被告', VICTIM: '被害人', VICTIM_ORG: '被害機關',
  APPELLANT: '抗告人', JUDGE: '法官', PROSECUTOR: '檢察官',
  DEFENSE_LAWYER: '辯護人', LEGAL_GUARDIAN: '法定代理人',
  LAW: '適用法條', LAW_CLASSIFIED: '法條分類',
  ACT_TIME: '行為時間', RULING_TIME: '裁判時間', ACT_PLACE: '行為地點',
  PLATFORM: '散布平台', GROUP_NAME: '群組名稱', ACT_TYPE: '行為類型',
  RUMOR_CONTENT: '謠言內容', SPREAD_TYPE: '散布方式', SPREAD_DETAIL: '散布細節',
  VERDICT_CATEGORY: '判決類別', SANCTION: '處分', RATIONALE: '理由', OTHER: '其他',
  FALSITY: '虛偽性', FALSITY_DESC: '虛偽性說明',
  PUBLIC_HARM: '公共危害', PUBLIC_HARM_DESC: '公共危害說明',
  INTENT_BINARY: '主觀故意', INTENT_DETAIL: '故意細節', INTENT_DESC: '故意說明',
  LAW_COMPARISON: '法律比較',
  PROC_STAGE: '程序階段', PREV_DOC: '前案文書', NEXT_DOC: '後案文書',
};

async function init() {
  try {
    const resp = await fetch('/api/entities');
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    allEntities = data.entities || [];
    applyFilters();
  } catch (err) {
    document.getElementById('listPanel').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load: ${esc(String(err))}</div>`;
  }
}

document.getElementById('search').addEventListener('input', debounce(applyFilters, 200));

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const verdict = document.getElementById('filterVerdict').value;
  const platform = document.getElementById('filterPlatform').value;

  filtered = allEntities.filter(e => {
    const info = e.basic_info || {};
    if (q && !JSON.stringify(e).toLowerCase().includes(q)) return false;
    if (verdict && !toStr(info.VERDICT_CATEGORY).includes(verdict)) return false;
    if (platform && !toStr(info.PLATFORM).includes(platform)) return false;
    return true;
  });

  document.getElementById('stat').textContent = `${filtered.length} / ${allEntities.length}`;
  renderList();
}

function renderList() {
  const el = document.getElementById('listPanel');
  if (!filtered.length) {
    el.innerHTML = '<div class="loading">No matches</div>';
    return;
  }
  el.innerHTML = filtered.map((e, i) => {
    const info = e.basic_info || {};
    const v = toStr(info.VERDICT_CATEGORY);
    const vc = v.includes('不罰') || v.includes('無罪') ? 'tag-green' :
               v.includes('罰') || v.includes('有罪') || v.includes('起訴') ? 'tag-red' : 'tag-yellow';
    const active = e.doc_id === selectedDocId ? 'active' : '';
    return `<div class="list-item ${active}" onclick="selectCase(${i})">
      <div class="list-title">${esc(e.title)}</div>
      <div class="list-meta">
        <span>${esc(e.doc_id)}</span>
        <span>${esc(toStr(info.DEFENDANT))}</span>
        <span class="list-tag ${vc}">${esc(v.substring(0,10) || '—')}</span>
      </div>
    </div>`;
  }).join('');
}

function selectCase(i) {
  const e = filtered[i];
  if (!e) return;
  selectedDocId = e.doc_id;
  currentHighlight = '';
  renderList();
  renderEntity(e);
  loadFullText(e.doc_id);
}

function renderEntity(e) {
  const el = document.getElementById('entityPanel');
  const modules = Object.keys(e).filter(k => k !== 'doc_id' && k !== 'title');

  el.innerHTML = `
    <div class="panel-title">${esc(e.title)}<br><span style="color:var(--text2);font-size:11px">${esc(e.doc_id)} — click any value to highlight in full text</span></div>
    ${modules.map(mod => renderModule(mod, e[mod])).join('')}`;
  el.scrollTop = 0;

  // Wire row clicks via dataset (safer than inline onclick with quoted values)
  el.querySelectorAll('tr[data-needle]').forEach(tr => {
    tr.addEventListener('click', () => highlightInText(tr.dataset.needle, tr));
  });
}

// Format a heterogeneous value (string / list[str] / list[dict] / dict) for display.
// Returns {html, raw}. raw is the plain text used for full-text search.
function formatValue(v) {
  if (v === null || v === undefined || v === '') {
    return { html: '<span class="field-null">null</span>', raw: '' };
  }
  if (Array.isArray(v)) {
    if (!v.length) return { html: '<span class="field-null">null</span>', raw: '' };
    // list of dicts → render each item on its own line
    if (v.every(x => x && typeof x === 'object' && !Array.isArray(x))) {
      const lines = v.map(o => formatDict(o));
      return {
        html: lines.map(l => esc(l)).join('<br>'),
        raw: lines.join(' ；'),
      };
    }
    // list of primitives
    const flat = v.map(x => (x && typeof x === 'object') ? formatDict(x) : String(x));
    return { html: esc(flat.join('、')), raw: flat.join('、') };
  }
  if (typeof v === 'object') {
    const s = formatDict(v);
    return { html: esc(s), raw: s };
  }
  return { html: esc(String(v)), raw: String(v) };
}

// Render a {key: value, ...} as "key1：v1 ｜ key2：v2" with friendly labels.
function formatDict(o) {
  const PAIR_LABEL = {
    article: '法條', role: '作用',
    type: '類型', content: '內容', precedent: '判例',
  };
  return Object.entries(o)
    .filter(([, vv]) => vv !== null && vv !== undefined && vv !== '')
    .map(([k, vv]) => {
      const lk = PAIR_LABEL[k] || k;
      const lv = (vv && typeof vv === 'object') ? JSON.stringify(vv) : String(vv);
      return `${lk}：${lv}`;
    })
    .join(' ｜ ');
}

function renderModule(mod, fields) {
  if (fields === null || fields === undefined) return '';
  const label = esc(MODULE_LABEL[mod] || mod);

  // Normalize cited_authority shape: sometimes wrapped as {CITED_AUTHORITY: [...]}
  if (mod === 'cited_authority' && fields && !Array.isArray(fields) && typeof fields === 'object') {
    const inner = fields.CITED_AUTHORITY;
    if (inner === null || inner === undefined) {
      fields = [];
    } else if (Array.isArray(inner)) {
      fields = inner;
    }
  }

  // Top-level list (cited_authority) → numbered rows
  if (Array.isArray(fields)) {
    if (!fields.length) {
      return `<div class="module"><div class="module-title">${label}</div>
        <div style="font-size:12px;color:var(--text2);padding:6px 10px">（無）</div></div>`;
    }
    return `<div class="module">
      <div class="module-title">${label}</div>
      <table class="field-table">
        ${fields.map((item, i) => {
          const f = formatValue(item);
          return `<tr data-needle="${escAttr(f.raw)}" title="Click to find in full text">
            <td class="field-key">${i + 1}</td>
            <td class="field-val">${f.html}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
  }

  if (typeof fields !== 'object') return '';

  return `<div class="module">
    <div class="module-title">${label}</div>
    <table class="field-table">
      ${Object.entries(fields).map(([k, v]) => {
        const f = formatValue(v);
        const keyLabel = esc(FIELD_LABEL[k] || k);
        return `<tr data-needle="${escAttr(f.raw)}" title="Click to find in full text">
          <td class="field-key">${keyLabel}</td>
          <td class="field-val">${f.html}</td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}

async function loadFullText(docId) {
  const el = document.getElementById('fulltextPanel');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Loading full text...</div>';
  try {
    const resp = await fetch(`/api/doc/${docId}`);
    const data = await resp.json();
    el.dataset.rawText = data.full_text;
    el.innerHTML = `<div class="panel-title">Full Text</div><div class="fulltext-content">${esc(data.full_text)}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="loading" style="color:var(--red)">Error loading</div>`;
  }
}

function highlightInText(value, rowEl) {
  if (!value || value.length < 2) return;
  const el = document.getElementById('fulltextPanel');
  const raw = el.dataset.rawText;
  if (!raw) return;

  // Highlight all rows
  document.querySelectorAll('.highlight-row').forEach(r => r.classList.remove('highlight-row'));
  if (rowEl) rowEl.classList.add('highlight-row');

  // Take first 30 chars for highlight (long values are too noisy)
  const needle = value.length > 60 ? value.substring(0, 60) : value;
  const escaped = esc(raw);
  const needleEsc = esc(needle);

  if (!escaped.includes(needleEsc)) {
    // Try shorter substring
    const short = value.substring(0, 20);
    const shortEsc = esc(short);
    if (shortEsc.length >= 4 && escaped.includes(shortEsc)) {
      const highlighted = escaped.replaceAll(shortEsc, `<mark>${shortEsc}</mark>`);
      el.innerHTML = `<div class="panel-title">Full Text <span style="font-size:11px;color:var(--yellow)">— highlighting: ${esc(short)}...</span></div><div class="fulltext-content">${highlighted}</div>`;
    } else {
      el.innerHTML = `<div class="panel-title">Full Text <span style="font-size:11px;color:var(--red)">— "${esc(value.substring(0,30))}..." not found in text</span></div><div class="fulltext-content">${escaped}</div>`;
    }
  } else {
    const highlighted = escaped.replaceAll(needleEsc, `<mark>${needleEsc}</mark>`);
    el.innerHTML = `<div class="panel-title">Full Text <span style="font-size:11px;color:var(--green)">— highlighting: ${esc(needle.substring(0,30))}${needle.length > 30 ? '...' : ''}</span></div><div class="fulltext-content">${highlighted}</div>`;
  }

  // Scroll to first mark
  el.dataset.rawText = raw;
  setTimeout(() => {
    const mark = el.querySelector('mark');
    if (mark) mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function toStr(v) {
  if (v === null || v === undefined) return '';
  if (Array.isArray(v)) return v.join('、');
  return String(v);
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;')
    .replace(/\n/g,' ');
}
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

init();
</script>
</body>
</html>
